name: 8750

on:
  workflow_dispatch:
    inputs:
      brand:
        description: "Brand: Select your brand"
        required: true
        type: choice
        default: oneplus
        options: [Manual-Type, oneplus, xiaomi, sony]
      brand_manual:
        description: "Brand-Manual"
        required: false
        type: string
        default: ""
      soc:
        description: "SOC"
        required: true
        type: string
        default: "sm8750"
      clang_version:
        description: "Clang-Version"
        required: true
        type: choice
        default: clang-r563880c
        options:
          - clang-r416183b1
          - clang-r450784d
          - clang-r487747c
          - clang-r536225
          - clang-r547379
          - clang-r563880c
      kernel_source:
        description: "Kernel-Source"
        required: true
        type: choice
        default: LineageOS
        options: [Manual-Type, LineageOS, YAAP, PixelOS-Devices, PixelExperience-Devices, VoltageOS-Devices, BlissRoms-Devices, AxionAOSP-devices, AlphaDroid-devices, DerpFest-Devices, MistOS-Devices, crdroidandroid, Evolution-X-Devices, Infinity-X-Devices, OnePlus12R-development]
      kernel_source_manual:
        description: "Kernel-Source-Manual"
        required: false
        type: string
        default: ""
      kernel_source_format:
        description: "Source-Format"
        required: true
        type: choice
        default: android_kernel
        options: [android_kernel, kernel]
      kernel_branch:
        description: "Kernel-Branch"
        required: true
        type: string
        default: "lineage-23.2"
      kernel_configs:
        description: "Kernel-Configs"
        required: true
        type: choice
        default: oplus-sm8750-los
        options:
          - Manual-Type
          - oplus-sdm845-los
          - oplus-sm8150-los
          - oplus-sm8150-yaap
          - oplus-sm8250-los
          - oplus-sm8350-los
          - oplus-sm8550-los
          - oplus-sm8650-los
          - oplus-sm8750-los
      kernel_configs_manual:
        description: "Kernel-Configs-Manual"
        required: false
        type: string
        default: ""
      ksu_type:
        description: "KSU Type"
        required: true
        type: choice
        default: KernelSU-Next
        options:
          - None
          - Official-KernelSU
          - KernelSU-Next
          - KernelSU-Next-with-susfs
          - KowSU
          - KernelSU-by-xx
          - ReSukiSU
          - ReSukiSU-with-susfs
      io_scheduler:
        description: "IO Scheduler"
        required: true
        type: choice
        default: adios
        options: [none, adios, kyber, bfq]
      susfs-gki:
        description: "SUSFS-GKI"
        required: true
        type: choice
        default: None
        options:
          - None
          - android12-5.10
          - android13-5.10
          - android13-5.15
          - android14-5.15
          - android14-6.1
          - android15-6.6
          - android16-6.12
      susfs-nongki:
        description: "SUSFS-NONGKI"
        required: true
        type: choice
        default: None
        options: [None, "4.9", "4.14", "4.19", "5.4"]
      droidspaces:
        description: "DroidSpaces"
        required: true
        type: choice
        default: None
        options: [None, "6.12", "5.15-6.6", "5.10", "5.4", "4.14-4.19", "4.4-4.9", "3.18"]
      has_modules_repo:
        description: "Has-Modules-Repo"
        required: true
        type: boolean
        default: true
      enable_tmpfs-xattr:
        description: "TMPFS_XATTR"
        required: true
        type: boolean
        default: true
      enable_gcc:
        description: "Enable-GCC"
        required: true
        type: boolean
        default: false
      enable_gcc_32bits:
        description: "Enable-GCC-32Bits"
        required: true
        type: boolean
        default: false
      fuck_modules_sig_protect:
        description: "Fuck-Modules-Sig-Protect"
        required: true
        type: boolean
        default: false
      fuck_werror:
        description: "Fuck-Werror"
        required: true
        type: boolean
        default: false
      enable_my_own_susfs_patch:
        description: "Enable My Own SUSFS Patch"
        required: true
        type: boolean
        default: false

jobs:
  Kernel_CI:
    env:
      GH_TOKEN: ${{ github.token }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
      checks: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup SWAP
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 16

      - name: Install build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y bc bison flex libssl-dev libelf-dev libdw-dev \
            build-essential lz4 git python3 curl dwarves cpio gcc-aarch64-linux-gnu zip

      - name: Save all options
        run: |
          set -euo pipefail
          cat > options.txt << EOF
          brand:${{ inputs.brand }}
          brand_manual:${{ inputs.brand_manual }}
          soc:${{ inputs.soc }}
          clang_version:${{ inputs.clang_version }}
          kernel_source:${{ inputs.kernel_source }}
          kernel_source_manual:${{ inputs.kernel_source_manual }}
          kernel_source_format:${{ inputs.kernel_source_format }}
          kernel_branch:${{ inputs.kernel_branch }}
          kernel_configs:${{ inputs.kernel_configs }}
          kernel_configs_manual:${{ inputs.kernel_configs_manual }}
          ksu_type:${{ inputs.ksu_type }}
          io_scheduler:${{ inputs.io_scheduler }}
          susfs-gki:${{ inputs.susfs-gki }}
          susfs-nongki:${{ inputs.susfs-nongki }}
          droidspaces:${{ inputs.droidspaces }}
          has_modules_repo:${{ inputs.has_modules_repo }}
          enable_tmpfs-xattr:${{ inputs.enable_tmpfs-xattr }}
          enable_gcc:${{ inputs.enable_gcc }}
          enable_gcc_32bits:${{ inputs.enable_gcc_32bits }}
          fuck_modules_sig_protect:${{ inputs.fuck_modules_sig_protect }}
          fuck_werror:${{ inputs.fuck_werror }}
          enable_my_own_susfs_patch:${{ inputs.enable_my_own_susfs_patch }}
          EOF

      - name: Extract variables safely
        id: vars
        run: |
          set -euo pipefail
          if [[ "${{ inputs.brand }}" == "Manual-Type" ]]; then
            BRAND="${{ inputs.brand_manual }}"
          else
            BRAND="${{ inputs.brand }}"
          fi
          if [[ "${{ inputs.kernel_source }}" == "Manual-Type" ]]; then
            SOURCE="${{ inputs.kernel_source_manual }}"
          else
            SOURCE="${{ inputs.kernel_source }}"
          fi
          echo "BRAND=$BRAND" >> $GITHUB_ENV
          echo "SOURCE=$SOURCE" >> $GITHUB_ENV

      - name: Clone Kernel Source
        run: |
          set -euo pipefail
          git clone --depth=1 -b ${{ inputs.kernel_branch }} \
            "https://github.com/${SOURCE}/${{ inputs.kernel_source_format }}_${BRAND}_${{ inputs.soc }}.git" ${{ inputs.soc }} || exit 1

          if [[ "${{ inputs.has_modules_repo }}" == "true" ]]; then
            git clone --depth=1 -b ${{ inputs.kernel_branch }} \
              "https://github.com/${SOURCE}/${{ inputs.kernel_source_format }}_${BRAND}_${{ inputs.soc }}-modules.git" ${{ inputs.soc }}-modules || exit 1
          fi

      - name: Download AOSP Clang
        run: |
          set -euo pipefail
          case "${{ inputs.clang_version }}" in
            "clang-r416183b1") curl -LO https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android12-qpr3-release/clang-r416183b1.tar.gz || exit 1 ;;
            "clang-r450784d") curl -LO https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android13-qpr3-release/clang-r450784d.tar.gz || exit 1 ;;
            "clang-r487747c") curl -LO https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android14-qpr3-release/clang-r487747c.tar.gz || exit 1 ;;
            "clang-r536225") curl -LO https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android15-qpr2-release/clang-r536225.tar.gz || exit 1 ;;
            "clang-r547379") curl -LO https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android16-qpr2-release/clang-r547379.tar.gz || exit 1 ;;
            "clang-r563880c") curl -LO https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android16-qpr2-release/clang-r563880c.tar.gz || exit 1 ;;
          esac
          mkdir -p toolchains/${{ inputs.clang_version }}
          tar -xf "${{ inputs.clang_version }}.tar.gz" -C "toolchains/${{ inputs.clang_version }}" || exit 1

          if [[ "${{ inputs.enable_gcc_32bits }}" == "true" ]]; then
            curl -LO https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9/+archive/refs/heads/android12L-release.tar.gz || exit 1
            mkdir -p toolchains/arm-linux-androideabi
            tar -xf android12L-release.tar.gz -C toolchains/arm-linux-androideabi || exit 1
          fi

      - name: Include goodies
        run: |
          set -euo pipefail
          cd ${{ inputs.soc }} || exit 1

          case "${{ inputs.ksu_type }}" in
            "None") ;;
            "Official-KernelSU")
              curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/refs/heads/main/kernel/setup.sh" | bash -s main || exit 1 ;;
            "KowSU")
              curl -LSs "https://raw.githubusercontent.com/KOWX712/KernelSU/refs/heads/master/kernel/setup.sh" | bash -s master || exit 1 ;;
            "KernelSU-by-xx")
              curl -LSs "https://raw.githubusercontent.com/backslashxx/KernelSU/refs/heads/master/kernel/setup.sh" | bash -s master || exit 1 ;;
            "KernelSU-Next")
              curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/refs/heads/dev/kernel/setup.sh" | bash -s dev || exit 1 ;;
            "KernelSU-Next-with-susfs")
              curl -LSs "https://raw.githubusercontent.com/pershoot/KernelSU-Next/refs/heads/dev-susfs/kernel/setup.sh" | bash -s dev-susfs || exit 1 ;;
            "ReSukiSU"|"ReSukiSU-with-susfs")
              curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/refs/heads/main/kernel/setup.sh" | bash -s main || exit 1 ;;
          esac

          if [[ "${{ inputs.droidspaces }}" == "6.12" ]]; then
            curl -Lo patch-for-6.12.patch https://raw.githubusercontent.com/ravindu644/Droidspaces-OSS/refs/heads/main/Documentation/resources/kernel-patches/GKI/kernel-6.12/001.GKI-6.12-or-above-fix_sysvipc_kabi.patch || exit 1
            patch -p1 < patch-for-6.12.patch
            cp ${GITHUB_WORKSPACE}/configs/droidspaces-gki.config arch/arm64/configs/vendor/droidspaces.config

          elif [[ "${{ inputs.droidspaces }}" == "5.15-6.6" ]]; then
            curl -Lo patch-for-below-6.12.patch https://raw.githubusercontent.com/ravindu644/Droidspaces-OSS/refs/heads/main/Documentation/resources/kernel-patches/GKI/below-kernel-6.12/001.GKI-below-6.12-fix_sysvipc_kabi_6_7_8.patch || exit 1
            patch -p1 < patch-for-below-6.12.patch
            cp ${GITHUB_WORKSPACE}/configs/droidspaces-gki.config arch/arm64/configs/vendor/droidspaces.config

          elif [[ "${{ inputs.droidspaces }}" == "5.10" ]]; then
            curl -Lo patch-for-below-6.12.patch https://raw.githubusercontent.com/ravindu644/Droidspaces-OSS/refs/heads/main/Documentation/resources/kernel-patches/GKI/below-kernel-6.12/001.GKI-below-6.12-fix_sysvipc_kabi_6_7_8.patch || exit 1
            patch -p1 < patch-for-below-6.12.patch
            curl -Lo patch-for-5.10-or-lower.patch https://raw.githubusercontent.com/ravindu644/Droidspaces-OSS/refs/heads/main/Documentation/resources/kernel-patches/GKI/below-kernel-6.12/002.5.10_or_lower_use_android_abi_padding_for_posix_mqueue.patch || exit 1
            patch -p1 < patch-for-5.10-or-lower.patch
            cp ${GITHUB_WORKSPACE}/configs/droidspaces-gki.config arch/arm64/configs/vendor/droidspaces.config

          elif [[ "${{ inputs.droidspaces }}" == "5.4" ]]; then
            curl -Lo patch-for-below-6.12.patch https://raw.githubusercontent.com/ravindu644/Droidspaces-OSS/refs/heads/main/Documentation/resources/kernel-patches/GKI/below-kernel-6.12/001.GKI-below-6.12-fix_sysvipc_kabi_6_7_8.patch || exit 1
            patch -p1 < patch-for-below-6.12.patch
            curl -Lo patch-for-5.10-or-lower.patch https://raw.githubusercontent.com/ravindu644/Droidspaces-OSS/refs/heads/main/Documentation/resources/kernel-patches/GKI/below-kernel-6.12/002.5.10_or_lower_use_android_abi_padding_for_posix_mqueue.patch || exit 1
            sed -i '/ANDROID_OEM_DATA_ARRAY/d' patch-for-5.10-or-lower.patch
            git apply --recount patch-for-5.10-or-lower.patch
            cp ${GITHUB_WORKSPACE}/configs/droidspaces-gki.config arch/arm64/configs/vendor/droidspaces.config

          elif [[ "${{ inputs.droidspaces }}" == "4.14-4.19" ]]; then
            curl -Lo patch-fix-cgroup.patch https://raw.githubusercontent.com/ravindu644/Droidspaces-OSS/refs/heads/main/Documentation/resources/kernel-patches/non-GKI/02.fix_restore%20cgroup%20file%20prefix%20handling%20.patch || exit 1
            patch -p1 < patch-fix-cgroup.patch
            cp ${GITHUB_WORKSPACE}/configs/droidspaces-nongki.config arch/arm64/configs/vendor/droidspaces.config

          elif [[ "${{ inputs.droidspaces }}" == "4.4-4.9" ]]; then
            cp ${GITHUB_WORKSPACE}/configs/droidspaces-nongki.config arch/arm64/configs/vendor/droidspaces.config

          elif [[ "${{ inputs.droidspaces }}" == "3.18" ]]; then
            curl -Lo patch-fix-xt_qtaguid.patch https://raw.githubusercontent.com/ravindu644/Droidspaces-OSS/refs/heads/main/Documentation/resources/kernel-patches/non-GKI/01.fix_kernel_panic_in_xt_qtaguid.patch || exit 1
            patch -p1 < patch-fix-xt_qtaguid.patch
            cp ${GITHUB_WORKSPACE}/configs/droidspaces-nongki.config arch/arm64/configs/vendor/droidspaces.config
          fi

          if [[ "${{ inputs.ksu_type }}" == *susfs* ]]; then
            if [[ "${{ inputs.susfs-gki }}" == "None" && "${{ inputs.susfs-nongki }}" == "None" ]]; then
              echo "skip susfs"
            elif [[ "${{ inputs.susfs-gki }}" != "None" && "${{ inputs.susfs-nongki }}" != "None" ]]; then
              echo "ERROR: cannot select both GKI and NonGKI SUSFS at the same time"
              exit 1
            elif [[ "${{ inputs.susfs-gki }}" != "None" ]]; then
              git clone -b gki-${{ inputs.susfs-gki }} https://gitlab.com/simonpunk/susfs4ksu.git susfs || exit 1
              cd susfs
              cp ./kernel_patches/50_add_susfs_in_gki-${{ inputs.susfs-gki }}.patch ../susfs.patch
              cp ./kernel_patches/fs/* ../fs/
              cp ./kernel_patches/include/linux/* ../include/linux/
              cd ..
            elif [[ "${{ inputs.susfs-nongki }}" != "None" ]]; then
              curl -Lo susfs.patch https://raw.githubusercontent.com/JackA1ltman/NonGKI_Kernel_Build_2nd/refs/heads/mainline/Patches/Patch/susfs_patch_to_${{ inputs.susfs-nongki }}.patch || exit 1
              curl -Lo inline.sh https://raw.githubusercontent.com/JackA1ltman/NonGKI_Kernel_Build_2nd/refs/heads/mainline/Patches/susfs_inline_hook_patches.sh || exit 1
            fi

            if [[ "${{ inputs.enable_my_own_susfs_patch }}" == "true" ]]; then
              if [[ "${{ inputs.susfs-gki }}" == "android13-5.15" ]]; then
                patch -p1 < ${GITHUB_WORKSPACE}/patches/fix_task_mmu_c.patch
              fi
            fi

            if [[ "${{ inputs.susfs-gki }}" != "None" ]]; then
              patch -p1 < susfs.patch
            elif [[ "${{ inputs.susfs-nongki }}" != "None" ]]; then
              patch -p1 < susfs.patch
              bash inline.sh
            fi

            if [[ "${{ inputs.enable_my_own_susfs_patch }}" == "true" ]]; then
              if [[ "${{ inputs.susfs-nongki }}" == "5.4" ]]; then
                patch -p1 < ${GITHUB_WORKSPACE}/patches/fix_mount_in_5.4.patch
              fi
            fi
          fi

          touch ./.scmversion

      - name: Make Kernel Configs
        run: |
          set -euo pipefail
          CLANG_ROOT="${GITHUB_WORKSPACE}/toolchains/${{ inputs.clang_version }}/bin"
          export PATH="${CLANG_ROOT}:$PATH"
          export ARCH=arm64
          export SUBARCH=arm64
          export LLVM=1
          export LLVM_IAS=1

          if [[ "${{ inputs.enable_gcc }}" == "true" ]]; then
            export CROSS_COMPILE=aarch64-linux-gnu-
          fi
          if [[ "${{ inputs.enable_gcc_32bits }}" == "true" ]]; then
            export CROSS_COMPILE_ARM32=${GITHUB_WORKSPACE}/toolchains/arm-linux-androideabi/bin/arm-linux-androideabi-
          fi

          if [[ "${{ inputs.droidspaces }}" != "None" ]]; then
            export DROIDSPACES_CONFIG="vendor/droidspaces.config"
            echo "Enabled DroidSpaces config"
          else
            export DROIDSPACES_CONFIG=""
            echo "With no DroidSpaces config"
          fi

          cd ${{ inputs.soc }} || exit 1

          if [[ "${{ inputs.kernel_configs }}" == "Manual-Type" ]]; then
            if [[ -z "${{ inputs.kernel_configs_manual }}" ]]; then
              echo "ERROR: Manual-Type selected but no configs provided"
              exit 1
            fi
            KERNEL_CONFIGS="${{ inputs.kernel_configs_manual }}"
            echo -e "Applied manual kernel config: ${{ inputs.kernel_configs_manual }}"
          else
            case "${{ inputs.kernel_configs }}" in
              "oplus-sdm845-los")
              KERNEL_CONFIGS="enchilada_defconfig vendor/debugfs.config"
              "oplus-sm8150-los")
              KERNEL_CONFIGS="vendor/sm8150-perf_defconfig vendor/oplus.config"
              "oplus-sm8150-yaap")
              KERNEL_CONFIGS="gulch_defconfig vendor/debugfs.config"
              "oplus-sm8250-los")
              KERNEL_CONFIGS="vendor/kona-perf_defconfig vendor/oplus.config"
              "oplus-sm8350-los")
              KERNEL_CONFIGS="vendor/lahaina-qgki_defconfig"
              "oplus-sm8550-los")
              KERNEL_CONFIGS="gki_defconfig vendor/kalama_GKI.config vendor/oplus/kalama_GKI.config vendor/debugfs.config"
              "oplus-sm8650-los")
              KERNEL_CONFIGS="gki_defconfig vendor/pineapple_GKI.config vendor/oplus/pineapple_GKI.config"
              "oplus-sm8750-los")
              KERNEL_CONFIGS="gki_defconfig vendor/sun_perf.config vendor/oplus/sun_perf.config"
              *)
                echo "ERROR: unknown kernel_configs preset"
                exit 1 ;;
            esac
            echo -e "Applied ${{ inputs.kernel_configs }}"
          fi
          configs_list=(${KERNEL_CONFIGS})

          if [[ "${{ inputs.enable_tmpfs-xattr }}" == "true" ]]; then
            sed -i '/CONFIG_TMPFS_XATTR/d' arch/arm64/configs/${configs_list[0]}
            echo "CONFIG_TMPFS_XATTR=y" >> arch/arm64/configs/${configs_list[0]}
            echo "Enabled TMPFS_XATTR"
          fi

          if [[ "${{ inputs.fuck_werror }}" == "true" ]]; then
            sed -i '/CONFIG_CC_WERROR/d' arch/arm64/configs/${configs_list[0]}
            sed -i '/CONFIG_WERROR/d' arch/arm64/configs/${configs_list[0]}
            echo "CONFIG_CC_WERROR=n" >> arch/arm64/configs/${configs_list[0]}
            echo "CONFIG_WERROR=n" >> arch/arm64/configs/${configs_list[0]}
            echo "Disabled WERROR and CC_WERROR"
          fi

          if [[ "${{ inputs.fuck_modules_sig_protect }}" == "true" ]]; then
            sed -i '/CONFIG_MODULE_SIG_PROTECT/d' arch/arm64/configs/${configs_list[0]}
            echo "CONFIG_MODULE_SIG_PROTECT=n" >> arch/arm64/configs/${configs_list[0]}
            echo "Disabled MODULE_SIG_PROTECT"
          fi

          if [[ "${{ inputs.ksu_type }}" == "KernelSU-by-xx" ]]; then
            echo "CONFIG_KSU_TAMPER_SYSCALL_TABLE=y" >> arch/arm64/configs/${configs_list[0]}
            echo "Enabled KSU_TAMPER_SYSCALL_TABLE for xxksu"
          fi

          if [[ "${{ inputs.ksu_type }}" == *susfs* ]]; then
            echo "CONFIG_KSU_SUSFS=y" >> arch/arm64/configs/${configs_list[0]}
            echo "Enabled KSU_SUSFS"
          fi
          make O=out $KERNEL_CONFIGS $DROIDSPACES_CONFIG

          case "${{ inputs.io_scheduler }}" in
            none) ;;
            adios)
              echo "CONFIG_MQ_IOSCHED_ADIOS=y" >> out/.config
              echo "CONFIG_MQ_IOSCHED_DEFAULT_ADIOS=y" >> out/.config ;;
            kyber|bfq)
              echo "CONFIG_DEFAULT_IOSCHED=\"${{ inputs.io_scheduler }}\"" >> out/.config ;;
          esac

          echo "CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE=y" >> out/.config

      - name: Build Kernel Image
        run: |
          set -euo pipefail
          cd ${{ inputs.soc }} || exit 1

          CLANG_ROOT="${GITHUB_WORKSPACE}/toolchains/${{ inputs.clang_version }}/bin"
          export PATH="${CLANG_ROOT}:$PATH"
          export ARCH=arm64
          export SUBARCH=arm64
          export LLVM=1
          export LLVM_IAS=1

          if [[ "${{ inputs.enable_gcc }}" == "true" ]]; then
            export CROSS_COMPILE=aarch64-linux-gnu-
          fi
          if [[ "${{ inputs.enable_gcc_32bits }}" == "true" ]]; then
            export CROSS_COMPILE_ARM32=${GITHUB_WORKSPACE}/toolchains/arm-linux-androideabi/bin/arm-linux-androideabi-
          fi

          make -j$(nproc) O=out KCFLAGS+=-O2 Image 2>&1 | tee ${GITHUB_WORKSPACE}/build.log

      - name: Make AnyKernel3
        run: |
          set -euo pipefail
          ZIP_NAME="${{ inputs.soc }}_${{ inputs.kernel_source }}-${{ inputs.kernel_branch }}_${{ inputs.ksu_type }}_$(date -u +"%Y%m%d_%H%M")"
          git clone https://github.com/Kernel-SU/AnyKernel3.git || exit 1
          cp ${{ inputs.soc }}/out/arch/arm64/boot/Image AnyKernel3/Image
          cp ${{ inputs.soc }}/out/arch/arm64/boot/Image ./Image
          cp ${{ inputs.soc }}/out/.config ./.config
          cd AnyKernel3 || exit 1
          sed -i "s|ksu_supported=false|ksu_supported=true|" anykernel.sh
          zip -r9 ../"${ZIP_NAME}.zip" * -x .git

      - name: Create GitHub Release
        run: |
          set -euo pipefail
          REL_NAME="${{ inputs.soc }}_${{ inputs.kernel_source }}-${{ inputs.kernel_branch }}_${{ inputs.ksu_type }}_$(date -u +"%Y%m%d_%H%M")"
          cd ${GITHUB_WORKSPACE} || exit 1
          ZIP_FILE=$(ls *.zip)
          gh release create "$REL_NAME" --title "$REL_NAME" --notes "$(cat options.txt)" "${ZIP_FILE}" Image build.log options.txt .config
